kind = "web"
previewPath = "/"
title = "GhostPilot Dashboard"
version = "1.0.0"
id = "artifacts/ghostpilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23119

[services.development]
run = "pnpm --filter @workspace/ghostpilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghostpilot", "run", "build" ]
publicDir = "artifacts/ghostpilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23119"
BASE_PATH = "/"
